    <style>

        /* Search Bar Styles */
        .search-container { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-bottom: 20px; margin-top: 10px; }
        .search-input { flex: 1; padding: 14px 20px; border: 2px solid #cbd5e1; border-radius: 30px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: #3b82f6; }
        .search-btn { background-color: #3b82f6; color: white; border: none; padding: 0 25px; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .search-btn:hover { background-color: #2563eb; }

        /* Lesson Card Styles */
        .lesson-card { background: white; width: 100%; max-width: 500px; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; position: relative; }
        
        .phrase-title { font-size: 32px; font-weight: 800; color: #1e3a8a; margin-bottom: 15px; }
        
        .play-btn { background-color: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 50%; width: 55px; height: 55px; font-size: 26px; cursor: pointer; margin-bottom: 25px; transition: all 0.2s; }
        .play-btn:hover { background-color: #e2e8f0; transform: scale(1.1); }
        
        .meaning-box { background-color: #eff6ff; border-left: 5px solid #3b82f6; padding: 15px; text-align: left; margin-bottom: 20px; border-radius: 0 8px 8px 0; }

        .progress { font-size: 14px; color: #64748b; margin-top: 15px; font-weight: bold; }

    </style>
</head>
<body>

    <!-- Search Section -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="ሀረግ ፈልግ (Search phrase)..." onkeyup="checkEnter(event)">
        <button class="search-btn" onclick="searchPhrase()">ፈልግ</button>
    </div>
    <div id="notFoundMsg">ይቅርታ፣ ይህ ሀረግ አልተገኘም! (Not found)</div>

    <!-- Lesson Section -->
    <div class="lesson-card">
        <div class="phrase-title" id="phraseText">Loading...</div>
        
        <button class="play-btn" onclick="playAudio()" title="ድምፁን ስማ">🔊</button>
        
        <div class="meaning-box">
            <div class="amharic-meaning" id="amharicMeaning">...</div>
        </div>
        
        <div class="teacher-explanation" id="explanationText">...</div>
        
        <div class="example-box">
            <div class="example-en" id="exampleEn">...</div>
            <div class="example-am" id="exampleAm">...</div>
        </div>
        
        <div class="navigation">
            <button class="nav-btn" onclick="prevLesson()">⬅️ ወደኋላ</button>
            <button class="nav-btn primary" onclick="nextLesson()">ቀጣይ ➡️</button>
        </div>
        <div class="progress" id="progressText">1 / 1000</div>
    </div>

    <script>
        const lessons = [
            {
                phrase: "Step up my game",
                amharic_meaning: "አቅምን ማሳደግ / ይበልጥ መጣር",
                explanation: "👨🏽‍🏫 አንድን የምንሰራውን ነገር ከበፊቱ በተሻለ እና በጠነከረ መንገድ ለመስራት ስንወስን የምንጠቀመው ነው።",
                example_en: "Now that I am entering my fourth year of sociology, I really need to step up my game.",
                example_am: "አሁን ወደ አራተኛ ዓመት የሶስዮሎጂ ትምህርቴ እየገባሁ ስለሆነ፣ አቅሜን ይበልጥ ማሳደግ አለብኝ።"
            },
            {
                phrase: "Out of the blue",
                amharic_meaning: "ድንገት / ሳይታሰብ",
                explanation: "👨🏽‍🏫 ምንም ያልጠበቅነው ነገር በድንገት ሲከሰት 'Out of the blue' (ከጠራ ሰማይ ላይ እንደመጣ) እንለዋለን።",
                example_en: "He was playing in the midfield and scored a long-range goal completely out of the blue.",
                example_am: "በአማካይ ቦታ ላይ እየተጫወተ ነበር፤ ከዛም ሙሉ በሙሉ ሳይታሰብ ከሩቅ መትቶ ጎል አስቆጠረ።"
            },
            {
                phrase: "A game changer",
                amharic_meaning: "ሁኔታውን ሙሉ በሙሉ የሚቀይር",
                explanation: "👨🏽‍🏫 አንድ አዲስ ሀሳብ፣ ሰው ወይም እቃ አሁን ያለውን ሁኔታ በከፍተኛ ደረጃ ወደተሻለ መንገድ ሲቀይረው የምንለው ነው።",
                example_en: "Having a player like Rodri in your team is a massive game changer.",
                example_am: "እንደ ሮድሪ ያለ ተጫዋች በቡድንህ ውስጥ መኖሩ ሁኔታውን ሙሉ በሙሉ የሚቀይር ነው።"
            },
            {
                phrase: "Look into",
                amharic_meaning: "ማጣራት / በጥልቀት ማጥናት",
                explanation: "👨🏽‍🏫 ስለ አንድ ጉዳይ ተጨማሪ መረጃ ለማግኘት ወይም ምርምር ለማድረግ የምንጠቀምበት ቃል ነው።",
                example_en: "For our rural sociology project, we will look into the effects of urbanization.",
                example_am: "ለገጠር ሶስዮሎጂ ፕሮጀክታችን፣ የከተሜነት መስፋፋት የሚያመጣውን ተፅዕኖ በጥልቀት እናጠናለን።"
            },
            {
                phrase: "Hit the books",
                amharic_meaning: "በትኩረት ማጥናት መጀመር",
                explanation: "👨🏽‍🏫 ፈተና ሲደርስ ወይም ትምህርት ሲከበድ 'መፅሐፍ መምታት' (በደንብ ማጥናት) አለብኝ ለማለት ነው።",
                example_en: "The exams are starting next week, so I need to hit the books early.",
                example_am: "ፈተናዎቹ በሚቀጥለው ሳምንት ስለሚጀምሩ፣ ገና ከጠዋቱ በትኩረት ማጥናት መጀመር አለብኝ።"
            },
            {
                phrase: "Piece of cake",
                amharic_meaning: "በጣም ቀላል",
                explanation: "👨🏽‍🏫 አንድ ስራ ወይም ፈተና ምንም እንደማይከብደን እና በቀላሉ እንደምንሰራው ለመግለፅ ነው።",
                example_en: "Don't worry, the test will be a piece of cake.",
                example_am: "አታስብ፣ ፈተናው በጣም ቀላል ይሆናል።"
            }
        ];

        let currentIndex = 0;

        function loadLesson() {
            const current = lessons[currentIndex];
            
            document.getElementById("phraseText").innerText = current.phrase;
            document.getElementById("amharicMeaning").innerText = current.amharic_meaning;
            document.getElementById("explanationText").innerText = current.explanation;
            document.getElementById("exampleEn").innerText = current.example_en;
            document.getElementById("exampleAm").innerText = current.example_am;
            document.getElementById("progressText").innerText = `${currentIndex + 1} / ${lessons.length}`;
            
            document.getElementById("notFoundMsg").style.display = "none";
        }

        function playAudio() {
            const current = lessons[currentIndex];
            const utterance = new SpeechSynthesisUtterance(current.phrase + ". " + current.example_en);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function nextLesson() {
            currentIndex++;
            if (currentIndex >= lessons.length) {
                currentIndex = 0; 
            }
            loadLesson();
        }

        function prevLesson() {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = lessons.length - 1; 
            }
            loadLesson();
        }

        function searchPhrase() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if(query === "") return;

            const foundIndex = lessons.findIndex(lesson => 
                lesson.phrase.toLowerCase().includes(query) || 
                lesson.amharic_meaning.includes(query)
            );

            if (foundIndex !== -1) {
                currentIndex = foundIndex;
                loadLesson();
            } else {
                document.getElementById("notFoundMsg").style.display = "block";
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                searchPhrase();
            }
        }

        loadLesson();
    </script>
</body>
</html>
