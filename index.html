```html
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wani English - Advanced Quiz Arena</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #1e3a8a; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .quiz-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .score-board { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: #4b5563; margin-bottom: 15px; background: #e0f2fe; padding: 10px; border-radius: 8px; }
        .question-text { font-size: 19px; font-weight: 600; color: #1e293b; margin-bottom: 20px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: #f8fafc; border: 2px solid #e2e8f0; padding: 14px; border-radius: 8px; font-size: 16px; text-align: left; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .option-btn:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; font-weight: bold; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; font-weight: bold; }
        .explanation-box { margin-top: 20px; padding: 15px; background-color: #fef3c7; border-left: 5px solid #d97706; border-radius: 6px; font-size: 15px; line-height: 1.5; display: none; }
        .explanation-title { font-weight: bold; color: #92400e; margin-bottom: 4px; }
        .next-btn { background-color: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; text-align: center; display: none; width: 100%; transition: background 0.2s; }
        .next-btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <header>Wani English - Advanced Quiz 🏆</header>

    <div class="quiz-container">
        <div>
            <div class="score-board">
                <span id="progressText">Question: 1/1000</span>
                <span id="scoreText">Score: 0</span>
            </div>
            <div class="question-text" id="questionText">Loading question...</div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="explanation-box" id="explanationBox">
                <div class="explanation-title">💡 የማረሚያ ማብራሪያ (Correction)：</div>
                <div id="explanationText"></div>
            </div>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">ቀጣይ ጥያቄ (Next) ➡️</button>
    </div>

    <script>
        const quizDatabase = [
            {
                question: "Identify the correct sentence:",
                options: [
                    "I am looking forward to meet you.",
                    "I am looking forward to meeting you.",
                    "I am looking forward for meet you.",
                    "I am looking forward meet you."
                ],
                answer: 1,
                explanation: "'Look forward to' ከሚለው ሀረግ በኋላ የሚመጣው ግስ ሁልጊዜም 'ING' መያዝ አለበት። ስለዚህ ትክክለኛው አባባል 'looking forward to meeting you' ነው።"
            },
            {
                question: "By the time the manager arrived, the report _______ by the team.",
                options: [
                    "had already been finished",
                    "has already finished",
                    "was already finish",
                    "already finished"
                ],
                answer: 0,
                explanation: "ባለፈ ታሪክ ውስጥ ከአንድ ድርጊት በፊት ቀድሞ የተጠናቀቀን ሌላ ድርጊት ለመግለጽ 'Past Perfect Passive' (had been + V3) እንጠቀማለን。"
            },
            {
                question: "Which phrase means 'to postpone a meeting'?",
                options: [
                    "Call off",
                    "Put off",
                    "Carry on",
                    "Break off"
                ],
                answer: 1,
                explanation: "'Put off' ማለት አንድን ቀጠሮ ወይም ስብሰባ ወደ ሌላ ጊዜ ማስተላለፍ (postpone) ማለት ነው። 'Call off' ማለት ግን ሙሉ በሙሉ መሰረዝ (cancel) ማለት ነው።"
            },
            {
                question: "If I _______ harder last year, I would have passed the exam.",
                options: [
                    "studied",
                    "would study",
                    "had studied",
                    "have studied"
                ],
                answer: 2,
                explanation: "ይህ 'Third Conditional' (የማይቻል ያለፈ ምኞት) ነው። ህጉ፡ If + Past Perfect (had + V3) ሆኖ በምላሹ ደግሞ would have + V3 ይይዛል።"
            },
            {
                question: "Choose the correct preposition: 'She is very good ______ playing football.'",
                options: [
                    "on",
                    "in",
                    "at",
                    "with"
                ],
                answer: 2,
                explanation: "በአንድ ነገር ላይ ጎበዝ መሆንን ለመግለጽ 'Good at' የሚለው ቅድመ-ቅጥያ (Preposition) በቋሚነት ጥቅም ላይ ይውላል።"
            },
            {
                question: "What is the meaning of the idiom 'Spill the beans'?",
                options: [
                    "To cook food",
                    "To reveal a secret accidentally",
                    "To make a mess",
                    "To be very angry"
                ],
                answer: 1,
                explanation: "'Spill the beans' ማለት የተደበቀ ምስጢርን ሳያስቡት አውጥቶ መናገር ወይም ማጋለጥ ማለት ነው።"
            },
            {
                question: "I have been living in this city _______ 2018.",
                options: [
                    "for",
                    "since",
                    "during",
                    "from"
                ],
                answer: 1,
                explanation: "አንድ ድርጊት የተጀመረበትን ትክክለኛ የጊዜ ነጥብ (Specific point in time) ለመግለጽ 'Since' እንጠቀማለን። 'For' የሚጠቅመው ለጠቅላላው የጊዜ ርዝማኔ (Duration) ነው።"
            },
            {
                question: "Neither the teacher nor the students _______ present today.",
                options: [
                    "is",
                    "was",
                    "are",
                    "am"
                ],
                answer: 2,
                explanation: "'Neither... nor' በሚኖርበት ጊዜ ግሱ የሚወሰነው ወደ እሱ ቅርብ በሆነው ስም (Noun) ነው። እዚህ ጋር 'students' ብዙ ቁጥር (Plural) ስለሆነ 'are' ይሆናል።"
            },
            {
                question: "The weather was bad, _______ we decided to stay at home.",
                options: [
                    "but",
                    "so",
                    "because",
                    "although"
                ],
                answer: 1,
                explanation: "የአንድን ነገር ውጤት (Result) ለመግለጽ 'So' (ስለዚህ) የሚለውን ማያያዣ እንጠቀማለን።"
            },
            {
                question: "She wouldn't have missed the bus if she _______ earlier.",
                options: [
                    "woke up",
                    "had woken up",
                    "would wake up",
                    "has woken up"
                ],
                answer: 1,
                explanation: "ይህ 'Third Conditional' ስለሆነ የ 'If' ክፍል ሁልጊዜም በ Past Perfect (had + V3) መዋቅር መጻፍ አለበት።"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        const progressText = document.getElementById("progressText");
        const scoreText = document.getElementById("scoreText");
        const questionText = document.getElementById("questionText");
        const optionsContainer = document.getElementById("optionsContainer");
        const explanationBox = document.getElementById("explanationBox");
        const explanationText = document.getElementById("explanationText");
        const nextBtn = document.getElementById("nextBtn");

        function loadQuestion() {
            hasAnswered = false;
            explanationBox.style.display = "none";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";

            if (currentQuestionIndex >= quizDatabase.length) {
                currentQuestionIndex = 0; 
                score = 0;
                scoreText.innerText = `Score: ${score}`;
            }

            let currentQuiz = quizDatabase[currentQuestionIndex];
            progressText.innerText = `Question: ${currentQuestionIndex + 1}/${quizDatabase.length}`;
            questionText.innerText = currentQuiz.question;

            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.innerText = option;
                button.onclick = () => checkAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, clickedButton) {
            if (hasAnswered) return;
            hasAnswered = true;

            let currentQuiz = quizDatabase[currentQuestionIndex];
            const allButtons = optionsContainer.getElementsByClassName("option-btn");

            if (selectedIndex === currentQuiz.answer) {
                clickedButton.classList.add("correct");
                score++;
                scoreText.innerText = `Score: ${score}`;
            } else {
                clickedButton.classList.add("incorrect");
                allButtons[currentQuiz.answer].classList.add("correct");
            }

            explanationText.innerText = currentQuiz.explanation;
            explanationBox.style.display = "block";
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>

```
