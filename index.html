```html
<!DOCTYPE html>

        .lesson-card { background: white; width: 100%; max-width: 500px; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        .header-badge { background-color: #ef4444; color: white; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        
        .phrase-title { font-size: 32px; font-weight: 800; color: #1e3a8a; margin-bottom: 10px; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="lesson-card">
        <div class="header-badge">አዲስ ሀረግ (Phrase of the Day)</div>
        
        <div class="phrase-title" id="phraseText">Loading...</div>
        
        <button class="play-btn" onclick="playAudio()" title="ድምፁን ስማ">🔊</button>
        
        <div class="meaning-box">
            <div class="meaning-title">አጭር ትርጉም:</div>
            <div class="amharic-meaning" id="amharicMeaning">...</div>

        <div class="teacher-explanation" id="explanationText">

        <div class="example-box">

            <div class="example-am" id="exampleAm">...</div>
        </div>
        
        <button class="next-lesson-btn" onclick="nextLesson()">ቀጣይ ሀረግ ➡️</button>
        <div class="progress" id="progressText">1 / 5</div>
    </div>

    <script>
        const lessons = [
            {
                phrase: "Piece of cake",
                amharic_meaning: "በጣም ቀላል",
                explanation: "👨🏽‍🏫 ልክ አንድን ኬክ መብላት ቀላል እንደሆነ ሁሉ፣ ይህን ሀረግ የምንጠቀመው አንድ ስራ ወይም ፈተና በጣም ቀላል መሆኑን ለማጋነን እና ለመግለፅ ነው።",
                example_en: "Don't worry, the sociology exam will be a piece of cake.",
                example_am: "አታስብ፣ የሶስዮሎጂ ፈተናው በጣም ቀላል ይሆናል።"
            },
            {
                phrase: "Under the weather",
                amharic_meaning: "ህመም መሰማት / ማመም",
                explanation: "👨🏽‍🏫 በቀጥታ ሲተረጎም 'ከአየር ንብረቱ ስር' ቢመስልም፣ ትክክለኛ ትርጉሙ ግን 'ትንሽ አሞኛል' ወይም ጤንነቴ ተጓድሏል ማለት ስንፈልግ የምንጠቀመው የተለመደ አባባል ነው።",
                example_en: "I can't come to the game today, I'm feeling a bit under the weather.",
                example_am: "ዛሬ ኳስ ልጫወት አልመጣም፣ ትንሽ እያመመኝ ነው።"
            },
            {
                phrase: "Bite the bullet",
                amharic_meaning: "አስቸጋሪ ነገርን በድፍረት መጋፈጥ",
                explanation: "👨🏽‍🏫 ድሮ ወታደሮች ህመም እንዳይሰማቸው ጥይት ይነክሱ ነበር። ዛሬ ላይ ይህን ሀረግ የምንጠቀመው አንድን ከባድ ወይም የሚያስፈራ ውሳኔ ወደኋላ ሳንል በድፍረት ስንጋፈጠው ነው።",
                example_en: "I hate public speaking, but I have to bite the bullet and give the presentation.",
                example_am: "በሰው ፊት ማውራት እጠላለሁ፣ ግን በድፍረት ተጋፍጬ ፕረዘንቴሽኑን ማቅረብ አለብኝ።"
            },
            {
                phrase: "Call it a day",
                amharic_meaning: "የዕለቱን ስራ ማቆም",
                explanation: "👨🏽‍🏫 'በቃ ለዛሬ ይበቃናል'፣ 'ስራችንን ጨርሰናል' ወይም 'ደክሞናል እናቁም' ብለን ስንወስን የምንጠቀመው አሪፍ አባባል ነው።",
                example_en: "We have been studying for 4 hours, let's call it a day.",
                example_am: "ለ4 ሰዓታት ስናጠና ቆይተናል፣ ለዛሬ ይበቃናል።"
            },
            {
                phrase: "Keep your eye on the ball",
                amharic_meaning: "ትኩረትን አለማጣት / አላማ ላይ ማተኮር",
                explanation: "👨🏽‍🏫 ይህ ሀረግ የመጣው ከስፖርት ነው። ኳስ ተጫዋቾች ሁሌም ኳሷን እንደሚከታተሉ ሁሉ፣ በህይወታችንም ዋናው ግባችን ወይም አላማችን ላይ ሙሉ ትኩረታችንን ማድረግ እንዳለብን የሚመክር ሀረግ ነው።",
                example_en: "If you want to graduate with good grades, you must keep your eye on the ball.",
                example_am: "በጥሩ ውጤት መመረቅ ከፈለግክ፣ ትኩረትህን አላማህ ላይ ማድረግ አለብህ።"
            }
        ];

        let currentIndex = 0;

        function loadLesson() {
            const current = lessons[currentIndex];
            
            document.getElementById("phraseText").innerText = current.phrase;
            document.getElementById("amharicMeaning").innerText = current.amharic_meaning;
            document.getElementById("explanationText").innerText = current.explanation;
            document.getElementById("exampleEn").innerText = current.example_en;
            document.getElementById("exampleAm").innerText = current.example_am;
            document.getElementById("progressText").innerText = `${currentIndex + 1} / ${lessons.length}`;
        }

        function playAudio() {
            const current = lessons[currentIndex];
            const utterance = new SpeechSynthesisUtterance(current.phrase + ". " + current.example_en);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // ትንሽ ቀስ ብሎ እንዲያነብ
            window.speechSynthesis.speak(utterance);
        }

        function nextLesson() {
            currentIndex++;
            if (currentIndex >= lessons.length) {
                currentIndex = 0; // ወደ መጀመሪያው እንዲመለስ
            }
            loadLesson();
        }

        // Initialize first lesson
        loadLesson();
    </script>
</body>
</html>
